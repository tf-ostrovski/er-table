name: Deploy Viewport Extension

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger full deploy
        uses: appleboy/ssh-action@v1
        with:
          host: 147.93.59.125
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /opt/sys/scripts/deploy.sh
