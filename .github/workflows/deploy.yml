name: Deploy er-table Extension Bundle

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Write SSH key
        run: |
          install -m 600 /dev/null ~/.ssh_key
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh_key

      - name: Trigger full deploy
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i ~/.ssh_key \
            root@${{ secrets.VPS_HOST }} \
            /opt/sys/scripts/deploy.sh

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh_key
